<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https: cosmos-confluence-img: cosmos-slack-img: cosmos-file:; script-src 'self'; worker-src 'self' blob:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cosmos</title>
  </head>
  <body>
    <!-- liquid-glass refraction filter for the `glass-dock` material (glass-dock-v1). A plain
         backdrop blur reads flat/"discrete"; feTurbulence -> feDisplacementMap warps the backdrop
         like real glass. Referenced by `backdrop-filter: url(#glass-dock-distortion)` (Chromium/
         Electron supports SVG filters as backdrop-filter). Hidden, zero-size, non-interactive. -->
    <svg aria-hidden="true" width="0" height="0" style="position: absolute; pointer-events: none">
      <filter
        id="glass-dock-distortion"
        x="0%"
        y="0%"
        width="100%"
        height="100%"
        color-interpolation-filters="sRGB"
      >
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.009 0.009"
          numOctaves="1"
          seed="92"
          result="noise"
        />
        <feGaussianBlur in="noise" stdDeviation="3" result="blurred" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="blurred"
          scale="0"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
