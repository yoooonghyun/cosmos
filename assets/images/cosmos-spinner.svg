  <style>
    @keyframes flSpin{to{transform:rotate(360deg)}}
    @keyframes spkA{0%,100%{opacity:.2;transform:scale(.45)}50%{opacity:1;transform:scale(1.2)}}
    @keyframes spkB{0%,100%{opacity:.25;transform:scale(.5)}45%{opacity:1;transform:scale(1.3)}}
